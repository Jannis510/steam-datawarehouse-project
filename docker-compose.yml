services:
  postgres:
    image: postgres:16-alpine
    container_name: ${POSTGRES_CONTAINER_NAME:-dwh-postgres}
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-dwh}
      POSTGRES_USER: ${POSTGRES_USER:-dwh}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-dwh}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - dwh-postgres-data:/var/lib/postgresql/data
      - ./docker/postgres/init:/docker-entrypoint-initdb.d
    healthcheck:
      test: ["CMD", "pg_isready", "-d", "postgres", "-U", "${POSTGRES_USER:-dwh}"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  pgadmin:
    image: dpage/pgadmin4:8.7
    container_name: ${PGADMIN_CONTAINER_NAME:-dwh-pgadmin}
    environment:
      PGADMIN_DEFAULT_EMAIL: ${PGADMIN_DEFAULT_EMAIL:-admin@example.com}
      PGADMIN_DEFAULT_PASSWORD: ${PGADMIN_DEFAULT_PASSWORD:-admin}
    ports:
      - "${PGADMIN_PORT:-5050}:80"
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - dwh-pgadmin-data:/var/lib/pgadmin
    restart: unless-stopped

  superset:
    build:
      context: ./docker/superset
      dockerfile: Dockerfile
    container_name: ${SUPERSET_CONTAINER_NAME:-dwh-superset}
    env_file:
      - .env
    environment:
      - ADMIN_USERNAME=admin
      - ADMIN_EMAIL=admin@superset.com
      - ADMIN_PASSWORD=admin
      - SUPERSET_SECRET_KEY=change-me
      - SQLALCHEMY_DATABASE_URI=postgresql+psycopg2://superset:superset@postgres:5432/superset
    ports:
      - "${SUPERSET_PORT:-8088}:8088"
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped

  etl:
    build:
      context: .
      dockerfile: docker/etl/Dockerfile
    profiles: ["etl"]
    depends_on:
      postgres:
        condition: service_healthy
    env_file:
      - .env
    environment:
      POSTGRES_HOST: postgres
    restart: "no"

volumes:
  dwh-postgres-data:
  dwh-pgadmin-data:
  superset-home:
